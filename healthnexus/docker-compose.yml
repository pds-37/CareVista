services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/healthnexus
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5000
      SEED_ON_START: 'true'
    ports:
      - '5000:5000'

volumes:
  mongo_data:
