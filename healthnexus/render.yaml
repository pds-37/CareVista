services:
  - type: web
    name: healthnexus-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SEED_ON_START
        value: "false"
      - key: MONGO_MAX_POOL_SIZE
        value: "10"
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
